<h2>Timer Fullscreen: Layout Revisado</h2>
<p class="subtitle">Círculo progressivo em verde com layout correto</p>

<div class="options">
  <!-- Fullscreen/Foco -->
  <div class="option" data-choice="fullscreen" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>Versão Fullscreen (Foco)</h3>
      <p style="color: #64748b; font-size: 13px; margin-bottom: 12px;">Tela cheia com círculo que progride em verde</p>

      <div style="background: linear-gradient(135deg, #0a0e1a 0%, #0f1729 100%); border: 1px solid #1e2d4d; border-radius: 12px; padding: 20px; min-height: 480px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;">

        <!-- Header minimalista -->
        <div style="position: absolute; top: 16px; width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 16px;">
          <div style="display: flex; align-items: center; gap: 8px;">
            <div style="width: 28px; height: 28px; border-radius: 50%; background: #1a2540; border: 1px solid #f59e0b; display: flex; align-items: center; justify-content: center; font-size: 12px;">⚙</div>
            <div style="font-size: 13px; font-weight: 600; color: #e2e8f0;">Sessão</div>
            <div style="display: flex; gap: 5px; margin-left: 8px;">
              <div style="width: 7px; height: 7px; border-radius: 50%; background: #ef4444;"></div>
              <div style="width: 7px; height: 7px; border-radius: 50%; background: #475569;"></div>
              <div style="width: 7px; height: 7px; border-radius: 50%; background: #475569;"></div>
              <div style="width: 7px; height: 7px; border-radius: 50%; background: #475569;"></div>
            </div>
          </div>
          <button style="width: 28px; height: 28px; border-radius: 50%; background: #0f1729; border: 1px solid #1e2d4d; color: #64748b; font-size: 14px; cursor: pointer;">✕</button>
        </div>

        <!-- Círculo progressivo grande -->
        <div style="margin-top: 20px; margin-bottom: 24px;">
          <svg width="260" height="260" style="display: block;">
            <!-- Círculo de fundo -->
            <circle cx="130" cy="130" r="120" fill="none" stroke="#1e2d4d" stroke-width="4"/>

            <!-- Círculo de progresso (65% = verde) -->
            <circle cx="130" cy="130" r="120" fill="none" stroke="#22c55e" stroke-width="4"
                    stroke-dasharray="486 740" stroke-linecap="round"
                    style="transform: rotate(-90deg); transform-origin: 130px 130px; filter: drop-shadow(0 0 16px rgba(34, 197, 94, 0.4));"/>

            <!-- Timer no centro -->
            <text x="130" y="140" text-anchor="middle" style="font-size: 56px; font-weight: 700; fill: #22c55e; font-family: 'Courier New'; letter-spacing: 0.05em;">00:00</text>
          </svg>
        </div>

        <!-- Status -->
        <div style="text-align: center; margin-bottom: 28px;">
          <div style="font-size: 14px; color: #94a3b8; margin-bottom: 6px;">Pausado</div>
          <div style="font-size: 12px; color: #64748b;">Foco</div>
        </div>

        <!-- Controles dentro do círculo (ícones pequenos) -->
        <div style="position: absolute; display: flex; gap: 10px; align-items: center; justify-content: center;">
          <button style="width: 32px; height: 32px; border-radius: 50%; background: #0f1729; border: 1px solid #1e2d4d; color: #64748b; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;" title="Fullscreen">⛶</button>
          <button style="width: 32px; height: 32px; border-radius: 50%; background: #0f1729; border: 1px solid #1e2d4d; color: #64748b; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;" title="Flutuante">⊞</button>
        </div>

        <!-- Controles na base -->
        <div style="display: flex; gap: 12px; align-items: center; justify-content: center; margin-top: 32px;">
          <button style="width: 48px; height: 48px; border-radius: 50%; background: #0f1729; border: 1px solid #1e2d4d; color: #64748b; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;" title="Voltar">←</button>

          <button style="width: 60px; height: 60px; border-radius: 50%; background: #22c55e; border: none; color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(34, 197, 94, 0.4);" title="Play">▶</button>

          <button style="padding: 12px 20px; background: transparent; border: 1px solid #1e2d4d; border-radius: 20px; color: #64748b; font-size: 12px; cursor: pointer; transition: all 0.2s;">Finalizar Sessão</button>
        </div>

        <!-- Dica de saída -->
        <div style="position: absolute; bottom: 16px; font-size: 10px; color: #475569;">
          Pressione <kbd style="background: #1e2d4d; padding: 2px 6px; border-radius: 3px; border: 1px solid #2d3d5d; font-family: 'Courier New';">ESC</kbd> para sair
        </div>
      </div>
      <p style="color: #475569; font-size: 12px; margin-top: 8px;">✓ Círculo em verde | Ícones dentro | Controles na base</p>
    </div>
  </div>
</div>

<style>
kbd {
  font-family: 'Courier New', monospace;
  font-size: 10px;
  vertical-align: middle;
}
</style>
