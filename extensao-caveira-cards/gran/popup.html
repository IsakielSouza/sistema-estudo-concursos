<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 260px;
    background: #1a0f00;
    color: #e2e8f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 20px;
  }
  .logo { font-size: 28px; margin-bottom: 12px; text-align: center; }
  h1 { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 4px; text-align: center; }
  p { font-size: 12px; color: #78350f; line-height: 1.5; margin-bottom: 16px; text-align: center; }
  .btn {
    display: block; width: 100%; padding: 10px;
    background: #ea580c; border: none; border-radius: 10px;
    color: white; font-size: 13px; font-weight: 600;
    cursor: pointer; text-align: center; margin-bottom: 8px;
    text-decoration: none; transition: background .2s;
  }
  .btn:hover { background: #c2410c; }
  .btn.secondary {
    background: #1f1100; border: 1px solid #431407;
    color: #78350f; font-weight: 400;
  }
  .btn.secondary:hover { color: #e2e8f0; border-color: #ea580c; }
  .status {
    background: #1f1100; border: 1px solid #431407;
    border-radius: 8px; padding: 10px 12px;
    font-size: 11px; color: #10b981; margin-bottom: 12px;
  }
  .credit { margin-top: 12px; text-align: center; font-size: 11px; color: #431407; }
  .credit strong { color: #ea580c; }
</style>
</head>
<body>
  <div class="logo">📚</div>
  <h1>Gran Questões → Anki</h1>
  <p>Caderno de Erros automático</p>
  <div class="status">✓ Extensão ativa no Gran Questões</div>
  <a class="btn secondary" href="https://ankiweb.net/shared/info/2055492159" target="_blank">Instalar AnkiConnect</a>
  <div class="credit">Desenvolvido por <strong>@concurseiroti2025</strong></div>
</body>
</html>
