<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 260px;
    background: #080d1a;
    color: #e2e8f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 20px;
  }
  .logo { font-size: 28px; margin-bottom: 12px; text-align: center; }
  h1 { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 4px; text-align: center; }
  p { font-size: 12px; color: #64748b; line-height: 1.5; margin-bottom: 16px; text-align: center; }
  .btn {
    display: block; width: 100%; padding: 10px;
    background: #3b6ff5; border: none; border-radius: 10px;
    color: white; font-size: 13px; font-weight: 600;
    cursor: pointer; text-align: center; margin-bottom: 8px;
    text-decoration: none; transition: background .2s;
  }
  .btn:hover { background: #2d5ce0; }
  .btn.secondary {
    background: #0f1729; border: 1px solid #1e2d4d;
    color: #64748b; font-weight: 400;
  }
  .btn.secondary:hover { color: #e2e8f0; border-color: #3b6ff5; }
  .status {
    background: #0f1729; border: 1px solid #1e2d4d;
    border-radius: 8px; padding: 10px 12px;
    font-size: 11px; color: #10b981; margin-bottom: 12px;
  }
</style>
</head>
