<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100%;
      height: 100vh;
      background: linear-gradient(135deg, #0a0e1a 0%, #0f1729 100%);
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Header */
    .fullscreen-header {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 10;
    }
    .fullscreen-header-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #1a2540;
      border: 1px solid #f59e0b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }
    .fullscreen-header-title {
      font-size: 13px;
      font-weight: 600;
      color: #e2e8f0;
    }
    .fullscreen-indicators {
      display: flex;
      gap: 5px;
      margin-left: 8px;
    }
    .fullscreen-indicator {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #475569;
    }
    .fullscreen-indicator.active {
      background: #22c55e;
    }
    .fullscreen-indicator.completed {
      background: #22c55e;
    }
    .fullscreen-indicator.break {
      background: #eab308;
    }
    .fullscreen-close {
      margin-left: auto;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #0f1729;
      border: 1px solid #1e2d4d;
      color: #64748b;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .fullscreen-close:hover {
      border-color: #3b6ff5;
      color: #e2e8f0;
    }

    /* ── Toggle switch (padrão do sistema) ── */
    .toggle-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #0f1729;
      border: 1px solid #1e2d4d;
      border-radius: 8px;
      margin-left: 12px;
      min-width: 160px;
    }
    .toggle-label-text { font-size: 11px; font-weight: 500; }
    .switch {
      position: relative;
      display: inline-block;
      width: 32px;
      height: 18px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #334155;
      transition: .2s;
      border-radius: 20px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 12px; width: 12px;
      left: 3px; bottom: 3px;
      background: white;
      transition: .2s;
      border-radius: 50%;
    }
    input:checked + .slider { background: #22c55e; }
    input:checked + .slider:before { transform: translateX(14px); }

    /* Círculo grande */
    .fullscreen-circle-container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
    }

    /* Status */
    .fullscreen-status {
      text-align: center;
      margin-bottom: 32px;
    }
    .fullscreen-status-main {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 4px;
    }
    .fullscreen-status-sub {
      font-size: 12px;
      color: #64748b;
    }

    /* Controles */
    .fullscreen-controls {
      display: flex;
      gap: 16px;
      align-items: center;
      z-index: 10;
    }
    .fullscreen-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #0f1729;
      border: 1px solid #1e2d4d;
      color: #64748b;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .fullscreen-btn:hover {
      border-color: #3b6ff5;
      color: #e2e8f0;
    }
    .fullscreen-play-btn {
      width: 60px;
      height: 60px;
      background: #22c55e;
      border: none;
      color: white;
      font-size: 24px;
      box-shadow: 0 8px 24px rgba(34, 197, 94, 0.4);
    }
    .fullscreen-play-btn:hover {
      background: #16a34a;
    }
    .fullscreen-finish-btn {
      padding: 12px 20px;
      background: transparent;
      border: 1px solid #1e2d4d;
      border-radius: 20px;
      color: #64748b;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .fullscreen-finish-btn:hover {
      border-color: #3b6ff5;
      color: #e2e8f0;
    }

    /* Hint ESC */
    .fullscreen-hint {
      position: absolute;
      bottom: 16px;
      font-size: 10px;
      color: #475569;
    }
    .fullscreen-hint kbd {
      background: #1e2d4d;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="fullscreen-header">
    <div class="fullscreen-header-icon">⚙</div>
    <div class="fullscreen-header-title">Sessão</div>
    <div class="toggle-wrap">
      <span id="mode-toggle-label" class="toggle-label-text" style="color: #22c55e;">Modo: Pomodoro</span>
      <label class="switch">
        <input type="checkbox" id="mode-toggle" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="fullscreen-indicators" id="fullscreen-indicators">
      <div class="fullscreen-indicator active"></div>
      <div class="fullscreen-indicator"></div>
      <div class="fullscreen-indicator"></div>
      <div class="fullscreen-indicator"></div>
    </div>
    <button class="fullscreen-close" id="fullscreen-close-btn">✕</button>
  </div>

  <!-- Círculo grande -->
  <div class="fullscreen-circle-container">
    <svg width="280" height="280" id="fullscreen-svg">
      <circle cx="140" cy="140" r="128" fill="none" stroke="#1e2d4d" stroke-width="4"/>
      <circle cx="140" cy="140" r="128" fill="none" stroke="#22c55e" stroke-width="4"
              stroke-dasharray="554 804" stroke-linecap="round" id="fullscreen-progress-circle"
              style="transform: rotate(-90deg); transform-origin: 140px 140px; filter: drop-shadow(0 0 16px rgba(34, 197, 94, 0.4));"/>
      <text x="140" y="150" text-anchor="middle" style="font-size: 56px; font-weight: 700; fill: #22c55e; font-family: 'Courier New'; letter-spacing: 0.05em;" id="fullscreen-display">00:00</text>
    </svg>
  </div>

  <!-- Status -->
  <div class="fullscreen-status">
    <div class="fullscreen-status-main" id="fullscreen-status-main">Pausado</div>
    <div class="fullscreen-status-sub" id="fullscreen-status-sub">Foco</div>
  </div>

  <!-- Controles -->
  <div class="fullscreen-controls" id="fullscreen-standard-controls">
    <button class="fullscreen-btn" id="fullscreen-back-btn">←</button>
    <button class="fullscreen-btn fullscreen-play-btn" id="fullscreen-play-btn">▶</button>
    <button class="fullscreen-finish-btn" id="fullscreen-finish-btn">⏹ Encerrar sessão</button>
  </div>

  <!-- Ações ao finalizar Pomodoro (Fullscreen) -->
  <div class="fullscreen-controls" id="fullscreen-finish-actions" style="display: none; flex-direction: column; gap: 16px;">
    <button class="fullscreen-finish-btn" id="btn-fs-continuar-estudo" style="background: #1e3a8a; border-color: #3b82f6; color: #93c5fd; width: 280px; font-weight: 700;">
      ▶ Continuar Estudo (Livre)
    </button>
    <div style="display: flex; gap: 12px;">
      <button class="fullscreen-finish-btn" id="btn-fs-iniciar-pausa" style="background: #92400e; border-color: #f59e0b; color: #fef3c7; font-weight: 700;">
        ☕ Iniciar Pausa
      </button>
      <button class="fullscreen-finish-btn" id="btn-fs-proximo-ciclo" style="background: #14532d; border-color: #22c55e; color: #4ade80; display: none; font-weight: 700;">
        🍅 Próximo Ciclo
      </button>
      <button class="fullscreen-finish-btn" id="btn-fs-encerrar" style="background: #3b0a0a; border-color: #ef4444; color: #fca5a5; font-weight: 700;">
        ⏹ Encerrar
      </button>
    </div>
  </div>

  <!-- Hint -->
  <div class="fullscreen-hint">
    Pressione <kbd>ESC</kbd> para sair
  </div>

  <script src="timer-fullscreen.js"></script>
</body>
</html>
