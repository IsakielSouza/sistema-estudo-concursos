<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      height: 100px;
      background: #1a1a2e;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      display: flex;
      align-items: center;
      padding: 10px;
    }

    .main-container {
      background: #16162a;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Top Row: Timer and Controls */
    .top-row {
      display: flex;
      align-items: center;
      padding: 8px 12px 4px;
      flex: 1;
    }

    .timer-display {
      font-size: 32px;
      font-weight: 800;
      color: #ffffff;
      margin-right: auto;
      font-family: 'Segoe UI', sans-serif;
    }

    .controls {
      display: flex;
      gap: 8px;
    }

    .control-btn {
      background: #1e1e3a;
      border: none;
      color: #94a3b8;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .control-btn:hover {
      background: #2a2a4a;
      color: #ffffff;
    }

    .control-btn.active {
      color: #22c55e;
    }

    /* Bottom Row: Info */
    .bottom-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 12px 8px;
      border-top: 1px solid #1e1e3a;
    }

    .mode-indicator {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    .mode-foco { color: #ef4444; }
    .mode-livre { color: #3b82f6; }
    .mode-pausa { color: #f59e0b; }

    .questoes-count {
      font-size: 11px;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 800;
      color: #ffffff;
    }

    .brand img {
      width: 16px;
      height: 16px;
    }

    /* Power Off Button */
    .power-btn {
      position: absolute;
      top: -10px;
      right: -10px;
      width: 32px;
      height: 32px;
      background: #16162a;
      border: 2px solid #2a2a4a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 14px;
      cursor: pointer;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .power-btn:hover {
      background: #ef4444;
      border-color: #ef4444;
    }

    /* Hidden elements for logic */
    #mode-toggle { display: none; }
  </style>
</head>
<body>
  <div class="power-btn" id="floating-close-btn" title="Fechar">⏻</div>
  
  <div class="main-container">
    <div class="top-row">
      <div class="timer-display" id="floating-display">25:00</div>
      
      <div class="controls">
        <button class="control-btn" id="floating-eye-btn" title="Ver detalhes">👁</button>
        <button class="control-btn" id="floating-play-btn" title="Iniciar/Pausar">▶</button>
        <button class="control-btn" id="floating-reset-btn" title="Reset">↻</button>
        <button class="control-btn" id="floating-check-btn" title="Finalizar">✓</button>
      </div>
    </div>
    
    <div class="bottom-row">
      <div class="mode-indicator mode-foco" id="mode-display">
        FOCO <span style="font-size: 10px;">⇅</span>
      </div>
      
      <div class="questoes-count" id="questoes-count">
        0 QUESTÕES
      </div>
      
      <div class="brand">
        <img src="CaveiraCards.png" alt="">
        caveiracards
      </div>
    </div>
  </div>

  <input type="checkbox" id="mode-toggle">
  <script src="timer-floating.js"></script>
</body>
</html>
