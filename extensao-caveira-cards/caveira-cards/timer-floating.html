<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      min-height: 280px;
      background: linear-gradient(135deg, #0a0e1a 0%, #0f1729 100%);
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Timer display */
    .floating-label {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .floating-timer {
      font-size: 48px;
      font-weight: 700;
      color: #22c55e;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.08em;
      margin-bottom: 24px;
    }

    /* Progress bar */
    .floating-progress-container {
      width: 100%;
      margin-bottom: 28px;
    }
    .floating-progress-bar {
      width: 100%;
      height: 4px;
      background: #1e2d4d;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .floating-progress-fill {
      height: 100%;
      background: #22c55e;
      border-radius: 2px;
      width: 65%;
      transition: width 0.3s ease;
    }
    .floating-progress-indicator {
      position: relative;
      height: 0;
    }
    .floating-progress-dot {
      position: absolute;
      left: 65%;
      transform: translateX(-50%);
      top: -8px;
      width: 12px;
      height: 12px;
      background: #f59e0b;
      border-radius: 50%;
      border: 2px solid #0f1729;
    }

    /* Status */
    .floating-status {
      font-size: 12px;
      color: #94a3b8;
      text-align: center;
      margin-bottom: 28px;
    }

    /* Controles */
    .floating-controls {
      display: flex;
      gap: 12px;
      width: 100%;
    }
    .floating-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #0f1729;
      border: 1px solid #1e2d4d;
      color: #64748b;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex: 1;
    }
    .floating-btn:hover {
      border-color: #3b6ff5;
      color: #e2e8f0;
    }
    .floating-play-btn {
      background: #22c55e;
      border: none;
      color: white;
      box-shadow: 0 8px 24px rgba(34, 197, 94, 0.4);
    }
    .floating-play-btn:hover {
      background: #16a34a;
    }
  </style>
</head>
<body>
  <!-- Timer display -->
  <div class="floating-label" id="floating-label">Foco</div>
  <div class="floating-timer" id="floating-display">00:00</div>

  <!-- Progress bar -->
  <div class="floating-progress-container">
    <div class="floating-progress-bar">
      <div class="floating-progress-fill" id="floating-progress-fill"></div>
    </div>
    <div class="floating-progress-indicator">
      <div class="floating-progress-dot" id="floating-progress-dot"></div>
    </div>
  </div>

  <!-- Status -->
  <div class="floating-status" id="floating-status">Pausado</div>

  <!-- Controles -->
  <div class="floating-controls">
    <button class="floating-btn" id="floating-back-btn">←</button>
    <button class="floating-btn floating-play-btn" id="floating-play-btn">▶</button>
  </div>

  <script src="timer-floating.js"></script>
</body>
</html>
