<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      min-height: 100vh;
    }
    body {
      background: linear-gradient(135deg, #0a0e1a 0%, #0f1729 100%);
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .timer-container {
      width: 320px;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .timer-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1e2d4d;
    }
    .timer-header-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #1a2540;
      border: 1px solid #f59e0b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .timer-header-btn:hover { background: #f59e0b; color: white; }
    .timer-header-title {
      font-size: 13px;
      font-weight: 600;
      color: #e2e8f0;
    }
    .timer-indicators {
      display: flex;
      gap: 6px;
      margin-left: auto;
    }
    .timer-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #475569;
    }
    .timer-indicator.active {
      background: #22c55e;
    }
    .timer-indicator.completed {
      background: #22c55e;
    }
    .timer-indicator.break {
      background: #eab308;
    }

    /* ── Toggle switch (padrão do sistema) ── */
    .toggle-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #0f1729;
      border: 1px solid #1e2d4d;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .toggle-label-text { font-size: 12px; font-weight: 500; }
    .switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #334155;
      transition: .2s;
      border-radius: 20px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 14px; width: 14px;
      left: 3px; bottom: 3px;
      background: white;
      transition: .2s;
      border-radius: 50%;
    }
    input:checked + .slider { background: #22c55e; }
    input:checked + .slider:before { transform: translateX(16px); }

    /* Abas */
    .timer-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .timer-tab {
      flex: 1;
      padding: 7px;
      background: #0f1729;
      border: 1px solid #1e2d4d;
      border-radius: 6px;
      color: #64748b;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .timer-tab.active {
      background: #22c55e;
      color: white;
      border-color: #22c55e;
    }
    .timer-tab:hover { border-color: #3b6ff5; color: #e2e8f0; }

    /* Círculo */
    .timer-circle-container {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }
    svg { display: block; }

    /* Status */
    .timer-status {
      text-align: center;
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 12px;
    }

    /* Configuração (escondida inicialmente) */
    .timer-config {
      display: none;
      background: #0f1729;
      border: 1px solid #1e2d4d;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 12px;
    }
    .timer-config.show {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .timer-config-item {
      text-align: center;
    }
    .timer-config-label {
      font-size: 10px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .timer-config-input {
      background: #080d1a;
      border: 1px solid #1e2d4d;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
    }
    .timer-config-input button {
      background: none;
      border: none;
      color: #64748b;
      font-size: 14px;
      cursor: pointer;
      padding: 0;
      width: 16px;
    }
    .timer-config-input button:hover { color: #e2e8f0; }
    .timer-config-input input {
      background: none;
      border: none;
      color: #e2e8f0;
      font-size: 16px;
      font-weight: 700;
      width: 40px;
      text-align: center;
      outline: none;
      -moz-appearance: textfield;
    }
    .timer-config-input input::-webkit-outer-spin-button,
    .timer-config-input input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .timer-reset-btn {
      width: 100%;
      padding: 7px;
      background: transparent;
      border: 1px solid #1e2d4d;
      border-radius: 6px;
      color: #64748b;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: border-color 0.2s;
    }
    .timer-reset-btn:hover { border-color: #3b6ff5; color: #e2e8f0; }

    /* Controles */
    .timer-controls {
      display: flex;
      gap: 6px;
    }
    .timer-controls-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #0f1729;
      border: 1px solid #1e2d4d;
      color: #64748b;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .timer-controls-btn:hover { border-color: #3b6ff5; color: #e2e8f0; }
    .timer-play-btn {
      flex: 1;
      background: #14532d;
      border: 1px solid #22c55e;
      border-radius: 8px;
      color: #4ade80;
      font-weight: 700;
      padding: 8px 16px;
      font-size: 14px;
    }
    .timer-play-btn:hover { background: #166534; }
    .timer-play-btn:active { transform: scale(0.98); }

    /* Back button */
    .timer-back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      padding: 8px 12px;
      background: #0f1729;
      border: 1px solid #1e2d4d;
      border-radius: 8px;
      color: #94a3b8;
      font-size: 11px;
      cursor: pointer;
      margin-bottom: 8px;
      transition: all 0.2s;
    }
    .timer-back-btn:hover { border-color: #3b6ff5; color: #e2e8f0; }

    /* ── Sessão de Estudo (igual ao popup) ── */
    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #334155;
      margin-bottom: 8px;
      margin-top: 20px;
    }
    .session-box {
      background: #0f1729;
      border: 1px solid #1e2d4d;
      border-radius: 10px;
      overflow: hidden;
    }
    .session-idle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
    }
    .session-idle-label {
      font-size: 12px;
      color: #64748b;
    }
    .btn-iniciar {
      background: #14532d;
      border: 1px solid #22c55e;
      border-radius: 6px;
      color: #4ade80;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 12px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-iniciar:hover { background: #166534; }
    .session-active {
      padding: 12px 14px;
    }
    .session-stats {
      display: flex;
      justify-content: space-around;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid #1e2d4d;
    }
    .session-stat { text-align: center; }
    .session-stat-val {
      font-size: 20px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: .02em;
    }
    .session-stat-val.green { color: #4ade80; }
    .session-stat-val.blue  { color: #93c5fd; }
    .session-stat-val.gold  { color: #fbbf24; }
    .session-stat-label {
      font-size: 10px;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-top: 2px;
    }
    .btn-encerrar {
      width: 100%;
      padding: 7px;
      background: transparent;
      border: 1px solid #ef4444;
      border-radius: 7px;
      color: #f87171;
      font-weight: 700;
      font-size: 11px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .btn-encerrar:hover { background: #3b0a0a; color: #fca5a5; }
    .session-summary { padding: 12px 14px; }
    .summary-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #475569;
      margin-bottom: 6px;
    }
    .summary-val {
      font-size: 14px;
      font-weight: 700;
      color: #e2e8f0;
      background: #1a2540;
      border: 1px solid #1e2d4d;
      border-radius: 7px;
      padding: 8px 10px;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: .02em;
    }
    .btn-nova-sessao {
      width: 100%;
      padding: 6px;
      background: transparent;
      border: 1px solid #1e2d4d;
      border-radius: 7px;
      color: #475569;
      font-size: 11px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .btn-nova-sessao:hover { border-color: #3b6ff5; color: #94a3b8; }
    .session-starting { padding: 10px 14px; }
    .session-starting-label {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 6px;
    }
    #input-caderno {
      width: 100%;
      background: #080d1a;
      border: 1px solid #1e2d4d;
      border-radius: 6px;
      padding: 7px 10px;
      color: #e2e8f0;
      font-size: 12px;
      margin-bottom: 8px;
      outline: none;
    }
    #input-caderno:focus { border-color: #3b6ff5; }
    .starting-actions { display: flex; gap: 6px; }
    .btn-cancelar-sessao {
      background: transparent;
      border: 1px solid #1e2d4d;
      border-radius: 6px;
      color: #475569;
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .btn-cancelar-sessao:hover { border-color: #3b6ff5; color: #94a3b8; }
    .session-caderno-label {
      font-size: 11px;
      color: #64748b;
      text-align: center;
      margin-top: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .btn-historico {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 6px;
      background: #0b1222;
      border: 1px solid #1e2d4d;
      border-radius: 10px;
      color: #94a3b8;
      font-size: 11px;
      cursor: pointer;
      margin-top: 10px;
      justify-content: center;
      transition: border-color .2s, color .2s;
    }
    .btn-historico:hover { border-color: #3b6ff5; color: #e2e8f0; }

    /* ── Header padrão ── */
    .page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #1e2d4d;
    }
    .page-header img { width: 40px; height: 40px; border-radius: 50%; }
    .page-header-text h1 { font-size: 15px; font-weight: 700; color: #fff; }
    .page-header-text p { font-size: 11px; color: #3b6ff5; margin-top: 2px; }

    /* ── Footer padrão ── */
    .page-footer {
      margin-top: 20px;
      padding-top: 14px;
      border-top: 1px solid #1e2d4d;
      text-align: center;
      font-size: 10px;
      color: #475569;
    }
    .page-footer a { color: #3b6ff5; text-decoration: none; }
    .page-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="timer-container">

  <!-- Header padrão -->
  <div class="page-header">
    <img src="CaveiraCards.png" alt="CaveiraCards">
    <div class="page-header-text">
      <h1>CaveiraCards</h1>
      <p>@isakielsouza</p>
    </div>
  </div>

  <!-- Header -->
  <div class="timer-header">
    <button class="timer-header-btn" id="timer-config-btn" title="Configurações">⚙</button>
    <div class="timer-header-title">Sessão</div>
    <div class="timer-indicators" id="timer-indicators">
      <div class="timer-indicator active"></div>
      <div class="timer-indicator"></div>
      <div class="timer-indicator"></div>
      <div class="timer-indicator"></div>
    </div>
  </div>

  <!-- Modo (Toggle padrão do sistema) -->
  <div class="toggle-wrap">
    <span id="mode-toggle-label" class="toggle-label-text" style="color: #22c55e;">Modo: Pomodoro</span>
    <label class="switch">
      <input type="checkbox" id="mode-toggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <!-- Configuração (escondida) -->
  <div class="timer-config" id="timer-config">
    <div class="timer-config-item">
      <div class="timer-config-label">Foco</div>
      <div class="timer-config-input">
        <button data-action="decrease" data-field="focus">−</button>
        <input type="number" id="timer-config-focus" value="25" min="1" max="999">
        <button data-action="increase" data-field="focus">+</button>
      </div>
    </div>
    <div class="timer-config-item">
      <div class="timer-config-label">Pausa C.</div>
      <div class="timer-config-input">
        <button data-action="decrease" data-field="shortBreak">−</button>
        <input type="number" id="timer-config-shortbreak" value="5" min="1" max="999">
        <button data-action="increase" data-field="shortBreak">+</button>
      </div>
    </div>
    <div class="timer-config-item">
      <div class="timer-config-label">Pausa L.</div>
      <div class="timer-config-input">
        <button data-action="decrease" data-field="longBreak">−</button>
        <input type="number" id="timer-config-longbreak" value="15" min="1" max="999">
        <button data-action="increase" data-field="longBreak">+</button>
      </div>
    </div>
    <div class="timer-config-item">
      <div class="timer-config-label">Sessões</div>
      <div class="timer-config-input">
        <button data-action="decrease" data-field="sessions">−</button>
        <input type="number" id="timer-config-sessions" value="4" min="1" max="99">
        <button data-action="increase" data-field="sessions">+</button>
      </div>
    </div>
  </div>
  <button class="timer-reset-btn" id="timer-reset-btn" style="display: none;">↻ Resetar Sessões</button>

  <!-- Círculo de progresso -->
  <div class="timer-circle-container">
    <svg width="140" height="140" id="timer-svg">
      <circle cx="70" cy="70" r="62" fill="none" stroke="#1e2d4d" stroke-width="3"/>
      <circle cx="70" cy="70" r="62" fill="none" stroke="#22c55e" stroke-width="3"
              stroke-dasharray="213 390" stroke-linecap="round" id="timer-progress-circle"
              style="transform: rotate(-90deg); transform-origin: 70px 70px;"/>
      <text x="70" y="78" text-anchor="middle" style="font-size: 28px; font-weight: 700; fill: #22c55e; font-family: 'Courier New';" id="timer-display">00:00</text>
    </svg>
  </div>

  <!-- Status -->
  <div class="timer-status" id="timer-status-text">Pausado</div>

  <!-- Ações ao finalizar Pomodoro -->
  <div id="pomodoro-finish-actions" style="display: none; flex-direction: column; gap: 8px; margin-bottom: 12px;">
    <button class="timer-play-btn" id="btn-continuar-estudo" style="background: #1e3a8a; border-color: #3b82f6; color: #93c5fd;">
      ▶ Continuar Estudo (Livre)
    </button>
    
    <div style="display: flex; gap: 8px;">
      <button class="timer-play-btn" id="btn-iniciar-pausa" style="flex: 1; background: #92400e; border-color: #f59e0b; color: #fef3c7; font-size: 13px;">
        ☕ Iniciar Pausa
      </button>
      <button class="timer-play-btn" id="btn-pular-pausa" style="flex: 1; background: #334155; border-color: #475569; color: #cbd5e1; font-size: 13px; display: none;">
        ⏭️ Pular Pausa
      </button>
      <button class="timer-play-btn" id="btn-proximo-ciclo" style="flex: 1; background: #14532d; border-color: #22c55e; color: #4ade80; display: none; font-size: 13px;">
        🍅 Próximo Ciclo
      </button>
      <button class="btn-encerrar" id="btn-encerrar-timer" style="flex: 1; padding: 8px; font-size: 11px;">
        ⏹ Encerrar
      </button>
    </div>
  </div>

  <!-- Controles -->
  <div class="timer-controls">
    <button class="timer-controls-btn" id="timer-fullscreen-btn" title="Modo Foco">⛶</button>
    <button class="timer-controls-btn" id="timer-floating-btn" title="Janela Flutuante">⊞</button>
    <button class="timer-controls-btn timer-play-btn" id="timer-play-btn">▶</button>
  </div>

  <!-- Back button -->
  <button class="timer-back-btn" id="timer-back-btn" style="display: none; margin-top: 12px;">← Voltar</button>

  <!-- Sessão de Estudo (sincronizada com popup) -->
  <p class="section-title">Sessão de estudo</p>
  <div class="session-box" id="session-box">

    <!-- Estado: idle -->
    <div class="session-idle" id="session-idle" style="flex-direction: column; gap: 10px; align-items: stretch;">
      <span class="session-idle-label">📚 Nenhuma sessão ativa — aperte ▶ para iniciar</span>
      <div>
        <div class="session-starting-label">🏷️ Tags para Anki (separadas por vírgula)</div>
        <input type="text" id="input-caderno" placeholder="Ex: PRF, Simulado, Aula01" autocomplete="off">
      </div>
      <button id="btn-historico-idle" class="btn-historico">📊 Ver Histórico</button>
    </div>

    <!-- Estado: ativa -->
    <div class="session-active" id="session-active" style="display:none">
      <div class="session-stats">
        <div class="session-stat">
          <div class="session-stat-val green" id="session-timer">00:00</div>
          <div class="session-stat-label">Tempo</div>
        </div>
        <div class="session-stat">
          <div class="session-stat-val blue" id="session-questoes">0</div>
          <div class="session-stat-label">Total</div>
        </div>
        <div class="session-stat">
          <div class="session-stat-val gold" id="session-acertos">0</div>
          <div class="session-stat-label">Acertos</div>
        </div>
      </div>
      <button class="btn-encerrar" id="btn-encerrar">⏹ Encerrar sessão</button>
      <div class="session-caderno-label" id="session-caderno"></div>
      <button id="btn-historico-active" class="btn-historico">📊 Ver Histórico</button>
    </div>

    <!-- Estado: resumo -->
    <div class="session-summary" id="session-summary" style="display:none">
      <div class="summary-label">Resumo da sessão</div>
      <div class="summary-val" id="summary-val">—</div>
      <div class="session-caderno-label" id="summary-caderno"></div>
      <button id="btn-historico-summary" class="btn-historico">📊 Ver Histórico Completo</button>
      <button class="btn-nova-sessao" id="btn-nova-sessao">+ Nova sessão</button>
    </div>

  </div>

  <!-- Footer padrão -->
  <div class="page-footer">
    Projeto livre &nbsp;·&nbsp;
    <a href="https://instagram.com/isakielsouza" target="_blank">Instagram</a>
    &nbsp;·&nbsp;
    <span id="app-version">v—</span>
  </div>

  </div>

  <script src="timer.js"></script>
</body>
</html>
