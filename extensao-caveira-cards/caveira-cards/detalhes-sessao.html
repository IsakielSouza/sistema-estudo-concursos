<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Detalhes da Sessão — CaveiraCards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #080d1a;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #0f1729 0%, #1a1a2e 100%);
    border-bottom: 1px solid #1e2d4d;
    padding: 24px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .header img {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 2px solid #3b6ff5;
  }
  .header h1 {
    font-size: 20px; font-weight: 800; color: #fff;
    flex: 1;
  }
  .btn-voltar {
    padding: 8px 16px;
    background: #1e2d4d;
    color: #93c5fd;
    border: 1px solid #3b6ff5;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 700;
    font-size: 14px;
    transition: all 0.2s;
  }
  .btn-voltar:hover {
    background: #3b6ff5;
    color: #fff;
  }

  /* ── Content ── */
  .content {
    max-width: 1000px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  .grid-resumo {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: #0f1729;
    border: 1px solid #1e2d4d;
    border-radius: 16px;
    padding: 20px;
    text-align: center;
  }
  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    color: #64748b;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }
  .stat-value {
    font-size: 24px;
    font-weight: 800;
    color: #fff;
  }
  .stat-value.success { color: #4ade80; }
  .stat-value.danger { color: #f87171; }

  .section-title {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    margin: 40px 0 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-main {
    background: #0f1729;
    border: 1px solid #1e2d4d;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
  }

  /* ── Tabelas ── */
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th {
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    color: #475569;
    padding: 12px 16px;
    border-bottom: 1px solid #1e2d4d;
  }
  td {
    padding: 16px;
    border-bottom: 1px solid #1e2d4d;
    font-size: 14px;
    color: #cbd5e1;
  }

  .materia-nome { font-weight: 700; color: #fff; }
  .progresso-bar-bg {
    width: 100%;
    height: 8px;
    background: #080d1a;
    border-radius: 4px;
    margin-top: 8px;
    overflow: hidden;
  }
  .progresso-bar-fill {
    height: 100%;
    background: #3b6ff5;
    border-radius: 4px;
  }

  /* ── Timeline ── */
  .timeline {
    position: relative;
    padding-left: 20px;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: #1e2d4d;
  }
  .timeline-item {
    position: relative;
    padding-bottom: 20px;
    padding-left: 20px;
  }
  .timeline-item::before {
    content: '';
    position: absolute;
    left: -25px; top: 5px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #3b6ff5;
    border: 2px solid #080d1a;
  }
  .timeline-item.error::before { background: #f87171; }
  .timeline-item.success::before { background: #4ade80; }

  .timeline-time { font-size: 11px; color: #64748b; margin-bottom: 4px; }
  .timeline-content {
    background: #1a1a2e;
    border: 1px solid #1e2d4d;
    border-radius: 8px;
    padding: 12px;
  }
  .timeline-materia { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
  .timeline-resultado { font-size: 12px; }

  .unmapped-warning {
    background: rgba(245, 158, 11, 0.1);
    border: 1px solid rgba(245, 158, 11, 0.3);
    color: #fbbf24;
    padding: 16px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

</style>
</head>
<body>

<div class="header">
  <img src="CaveiraCards.png" alt="CaveiraCards">
  <h1>Detalhes da Sessão</h1>
  <a href="sessoes.html" class="btn-voltar">← Voltar</a>
</div>

<div class="content">
  
  <div id="loading-state" style="text-align: center; padding: 100px; color: #64748b;">
    Carregando detalhes...
  </div>

  <div id="session-details" style="display: none;">
    <!-- Resumo Rápido -->
    <div class="grid-resumo">
      <div class="stat-card">
        <div class="stat-label">Data</div>
        <div class="stat-value" id="det-data">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Tempo Total</div>
        <div class="stat-value" id="det-tempo">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Questões</div>
        <div class="stat-value" id="det-questoes">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Aproveitamento</div>
        <div class="stat-value success" id="det-aproveitamento">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Tempo Médio/Q</div>
        <div class="stat-value" id="det-media">-</div>
      </div>
    </div>

    <!-- Mapeamento -->
    <div id="mapeamento-info"></div>

    <!-- Desempenho por Matéria -->
    <h2 class="section-title">📚 Desempenho por Matéria</h2>
    <div class="card-main">
      <table>
        <thead>
          <tr>
            <th>Matéria</th>
            <th>Questões</th>
            <th>Acertos</th>
            <th>%</th>
            <th style="width: 200px;">Progresso</th>
          </tr>
        </thead>
        <tbody id="lista-materias">
          <!-- JS -->
        </tbody>
      </table>
    </div>

    <!-- Linha do Tempo -->
    <h2 class="section-title">🕒 Linha do Tempo</h2>
    <div class="card-main">
      <div class="timeline" id="timeline-lista">
        <!-- JS -->
      </div>
    </div>
  </div>

</div>

<script src="detalhes-sessao.js"></script>

</body>
</html>
