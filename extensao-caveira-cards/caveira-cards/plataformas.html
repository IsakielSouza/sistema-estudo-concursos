<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Plataformas Homologadas — CaveiraCards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #080d1a;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #0f1729 0%, #1a1a2e 100%);
    border-bottom: 1px solid #1e2d4d;
    padding: 32px 24px 28px;
    text-align: center;
  }
  .header img {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 3px solid #3b6ff5;
    margin-bottom: 14px;
  }
  .header h1 {
    font-size: 24px; font-weight: 800; color: #fff;
    letter-spacing: -0.5px;
  }
  .header .sub {
    font-size: 12px; color: #3b6ff5;
    font-weight: 600; margin-top: 4px;
    text-transform: uppercase; letter-spacing: .08em;
  }

  /* ── Content ── */
  .content {
    max-width: 900px;
    margin: 0 auto;
    padding: 36px 24px 0;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 24px;
    margin-bottom: 40px;
  }

  .card {
    background: #0f1729;
    border: 1.px solid #1e2d4d;
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    height: 100%;
    border: 1px solid #1e2d4d;
  }

  .card:hover {
    transform: translateY(-5px);
    border-color: #3b6ff5;
  }

  .card-img-wrap {
    width: 100%;
    height: 180px;
    background: #1a2540;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.8;
  }

  .card-content {
    padding: 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .card-name {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
  }

  .card-tag {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    color: #3b6ff5;
    letter-spacing: .05em;
  }

  .btn-feedback {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: #1a2540;
    border: 1px solid #1e2d4d;
    border-radius: 12px;
    padding: 16px;
    color: #94a3b8;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.2s;
    margin-bottom: 40px;
  }

  .btn-feedback:hover {
    background: #1e2d4d;
    color: #e2e8f0;
    border-color: #3b6ff5;
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    margin-top: 40px;
    font-size: 12px;
    color: #334155;
  }
  .footer a { color: #3b6ff5; text-decoration: none; }

</style>
</head>
<body>

<div class="header">
  <img src="CaveiraCards.png" alt="CaveiraCards">
  <h1>CaveiraCards</h1>
  <div class="sub">Plataformas Homologadas</div>
</div>

<div class="content">

  <div class="grid">
    <!-- TEC -->
    <a href="https://www.tecconcursos.com.br" target="_blank" class="card">
      <div class="card-img-wrap" style="background: #1e3a5f;">
        <div style="font-size: 48px;">📚</div>
      </div>
      <div class="card-content">
        <span class="card-tag">Questões</span>
        <h2 class="card-name">TEC Concursos</h2>
      </div>
    </a>

    <!-- QConcursos -->
    <a href="https://www.qconcursos.com" target="_blank" class="card">
      <div class="card-img-wrap" style="background: #2a1a2e;">
        <div style="font-size: 48px;">🎓</div>
      </div>
      <div class="card-content">
        <span class="card-tag">Questões</span>
        <h2 class="card-name">QConcursos</h2>
      </div>
    </a>

    <!-- Gran -->
    <a href="https://questoes.grancursosonline.com.br" target="_blank" class="card">
      <div class="card-img-wrap" style="background: #1a2e1a;">
        <div style="font-size: 48px;">🚀</div>
      </div>
      <div class="card-content">
        <span class="card-tag">Questões</span>
        <h2 class="card-name">Gran Questões</h2>
      </div>
    </a>

    <!-- Projeto Caveira -->
    <a href="https://app.caveira.com" target="_blank" class="card">
      <div class="card-img-wrap" style="background: #1a0a0a;">
        <div style="font-size: 48px;">💀</div>
      </div>
      <div class="card-content">
        <span class="card-tag">Simulados & Questões</span>
        <h2 class="card-name">Projeto Caveira</h2>
      </div>
    </a>

    <!-- Deltinha -->
    <!--
      <a href="https://www.deltinha.com.br" target="_blank" class="card">
      <div class="card-img-wrap" style="background: #1a1a2e;">
        <div style="font-size: 48px;">⚖️</div>
      </div>
      <div class="card-content">
        <span class="card-tag">Questões</span>
        <h2 class="card-name">Deltinha</h2>
      </div>
      </a>
    -->

  </div>

  <a href="https://docs.google.com/forms/d/e/1FAIpQLScFUBk5DGpqb_WgPi0N4V3dnG1xl-NKTy-yFXXNmy5yCCwtlg/viewform?usp=publish-editor" target="_blank" class="btn-feedback">
    <span>💡 Sugestões ou Relatar Bug</span>
  </a>

  <div class="footer">
    CaveiraCards by <a href="https://instagram.com/isakielsouza" target="_blank">@isakielsouza</a>
    &nbsp;·&nbsp; Projeto livre &nbsp;·&nbsp; &copy; 2026
  </div>

</div>

</body>
</html>
