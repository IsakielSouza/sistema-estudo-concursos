<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gestão de Sessões — CaveiraCards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #080d1a;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #0f1729 0%, #1a1a2e 100%);
    border-bottom: 1px solid #1e2d4d;
    padding: 32px 24px 28px;
    text-align: center;
  }
  .header img {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 3px solid #3b6ff5;
    margin-bottom: 14px;
  }
  .header h1 {
    font-size: 24px; font-weight: 800; color: #fff;
    letter-spacing: -0.5px;
  }
  .header .sub {
    font-size: 12px; color: #3b6ff5;
    font-weight: 600; margin-top: 4px;
    text-transform: uppercase; letter-spacing: .08em;
  }

  /* ── Content ── */
  .content {
    max-width: 1000px;
    margin: 0 auto;
    padding: 36px 24px 0;
  }

  .top-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .section-card {
    background: #0f1729;
    border: 1px solid #1e2d4d;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 32px;
  }

  .section-title {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ── Formulário Manual ── */
  .manual-form {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 16px;
    align-items: flex-end;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .form-group label {
    font-size: 12px;
    font-weight: 700;
    color: #64748b;
    text-transform: uppercase;
  }

  .form-group input {
    background: #080d1a;
    border: 1px solid #1e2d4d;
    border-radius: 8px;
    padding: 10px 12px;
    color: #fff;
    font-size: 14px;
    outline: none;
  }

  .form-group input:focus {
    border-color: #3b6ff5;
  }

  .btn {
    padding: 10px 20px;
    background: #3b6ff5;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn:hover { background: #2d5ce0; }
  .btn.danger { background: #3b0a0a; color: #f87171; border: 1px solid #ef4444; }
  .btn.danger:hover { background: #ef4444; color: white; }

  /* ── Tabela Histórico ── */
  .table-wrap {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }

  th {
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    color: #475569;
    padding: 12px 16px;
    border-bottom: 1px solid #1e2d4d;
  }

  td {
    padding: 16px;
    border-bottom: 1px solid #1e2d4d;
    font-size: 14px;
    color: #cbd5e1;
  }

  .row-data { font-weight: 700; color: #fff; }
  .row-aproveitamento {
    font-weight: 800;
    color: #4ade80;
  }
  .row-aproveitamento.baixo { color: #f87171; }

  .actions {
    display: flex;
    gap: 10px;
  }

  .btn-icon {
    background: none;
    border: none;
    cursor: pointer;
    color: #475569;
    font-size: 16px;
    transition: color 0.2s;
  }
  .btn-icon:hover { color: #ef4444; }

  /* ── Footer ── */
  .footer {
    text-align: center;
    margin-top: 40px;
    font-size: 12px;
    color: #334155;
  }
  .footer a { color: #3b6ff5; text-decoration: none; }

</style>
</head>
<body>

<div class="header">
  <img src="CaveiraCards.png" alt="CaveiraCards">
  <h1>CaveiraCards</h1>
  <div class="sub">Gestão de Sessões & Histórico</div>
</div>

<div class="content">

  <!-- Adicionar Manual -->
  <div class="section-card">
    <h2 class="section-title">➕ Adicionar Sessão Manual</h2>
    <form class="manual-form" id="manual-form">
      <div class="form-group">
        <label>Data</label>
        <input type="date" id="form-data" required>
      </div>
      <div class="form-group">
        <label>Duração (minutos)</label>
        <input type="number" id="form-duracao" placeholder="Ex: 60" required min="1">
      </div>
      <div class="form-group">
        <label>Questões</label>
        <input type="number" id="form-questoes" placeholder="0" required min="0">
      </div>
      <div class="form-group">
        <label>Acertos</label>
        <input type="number" id="form-acertos" placeholder="0" required min="0">
      </div>
      <button type="submit" class="btn">Adicionar</button>
    </form>
  </div>

  <!-- Histórico -->
  <div class="section-card">
    <div class="top-actions">
      <h2 class="section-title">📊 Histórico de Estudos</h2>
      <div class="actions">
        <button class="btn" id="btn-exportar" style="background: #1e2d4d; color: #93c5fd;">Exportar .JSON</button>
        <button class="btn danger" id="btn-limpar-tudo">Limpar Tudo</button>
      </div>
    </div>
    
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Tempo</th>
            <th>Questões</th>
            <th>Acertos</th>
            <th>%</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="historico-lista">
          <!-- Renderizado via JS -->
        </tbody>
      </table>
    </div>
  </div>

  <div class="footer">
    CaveiraCards by <a href="https://instagram.com/isakielsouza" target="_blank">@isakielsouza</a>
    &nbsp;·&nbsp; Projeto livre &nbsp;·&nbsp; &copy; 2026
  </div>

</div>

<script src="sessoes.js"></script>

</body>
</html>
