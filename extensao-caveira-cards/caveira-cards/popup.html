<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 280px;
    background: #080d1a;
    color: #e2e8f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 20px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .header img { width: 40px; height: 40px; border-radius: 50%; }
  .header-text h1 { font-size: 15px; font-weight: 700; color: #fff; }
  .header-text p { font-size: 11px; color: #3b6ff5; margin-top: 2px; }
  .section-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #334155;
    margin-bottom: 8px;
  }
  .platforms { margin-bottom: 16px; }
  .platform {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: #0f1729;
    border: 1px solid #1e2d4d;
    border-radius: 8px;
    margin-bottom: 6px;
  }
  .platform-name { font-size: 12px; color: #cbd5e1; }
  .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .badge.ativo { background: #14532d; color: #4ade80; }
  .badge.inativo { background: #1e2d4d; color: #475569; }
  .badge.breve { background: #1e1a2d; color: #7c3aed; font-style: italic; }
  .btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 10px 14px;
    background: #0f1729;
    border: 1px solid #1e2d4d;
    border-radius: 10px;
    color: #94a3b8;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    margin-bottom: 8px;
    transition: border-color .2s, color .2s;
  }
  .btn:hover { border-color: #3b6ff5; color: #e2e8f0; }
  .btn.destaque {
    background: #3b6ff5;
    border-color: #3b6ff5;
    color: white;
    font-weight: 700;
  }
  .btn.destaque:hover { background: #2d5ce0; }
  .setup-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 10px 14px;
    background: #0f1729;
    border: 1px solid #1e2d4d;
    border-radius: 10px;
    color: #94a3b8;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 8px;
    transition: border-color .2s, color .2s;
    text-align: left;
  }
  .setup-btn:hover { border-color: #3b6ff5; color: #e2e8f0; }
  .setup-status {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .setup-status.ok { background: #14532d; color: #4ade80; }
  .setup-status.pendente { background: #1e2d4d; color: #475569; }
  .setup-status.erro { background: #3b0a0a; color: #f87171; }
  .setup-status.carregando { background: #1e2d4d; color: #93c5fd; }
  .footer {
    margin-top: 14px;
    text-align: center;
    font-size: 10px;
    color: #1e2d4d;
  }
  .footer a { color: #3b6ff5; text-decoration: none; }

  /* ── Toggle switch ── */
  .toggle-wrap {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: #0f1729;
    border: 1px solid #1e2d4d;
    border-radius: 8px;
    margin-bottom: 12px;
  }
  .toggle-label-text { font-size: 12px; }
  .switch {
    position: relative;
    display: inline-block;
    width: 36px;
    height: 20px;
    flex-shrink: 0;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #334155;
    transition: .2s;
    border-radius: 20px;
  }
  .slider:before {
    position: absolute;
    content: "";
    height: 14px; width: 14px;
    left: 3px; bottom: 3px;
    background: white;
    transition: .2s;
    border-radius: 50%;
  }
  input:checked + .slider { background: #22c55e; }
  input:checked + .slider:before { transform: translateX(16px); }

  /* ── Sessão de Estudo ── */
  .session-box {
    background: #0f1729;
    border: 1px solid #1e2d4d;
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .session-idle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
  }
  .session-idle-label {
    font-size: 12px;
    color: #64748b;
  }
  .btn-iniciar {
    background: #14532d;
    border: 1px solid #22c55e;
    border-radius: 6px;
    color: #4ade80;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 12px;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-iniciar:hover { background: #166534; }
  .session-active {
    padding: 12px 14px;
  }
  .session-stats {
    display: flex;
    justify-content: space-around;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid #1e2d4d;
  }
  .session-stat { text-align: center; }
  .session-stat-val {
    font-size: 20px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: .02em;
  }
  .session-stat-val.green { color: #4ade80; }
  .session-stat-val.blue  { color: #93c5fd; }
  .session-stat-val.gold  { color: #fbbf24; }
  .session-stat-label {
    font-size: 10px;
    color: #475569;
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-top: 2px;
  }
  .btn-encerrar {
    width: 100%;
    padding: 7px;
    background: transparent;
    border: 1px solid #ef4444;
    border-radius: 7px;
    color: #f87171;
    font-weight: 700;
    font-size: 11px;
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  .btn-encerrar:hover { background: #3b0a0a; color: #fca5a5; }
  .session-summary { padding: 12px 14px; }
  .summary-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #475569;
    margin-bottom: 6px;
  }
  .summary-val {
    font-size: 14px;
    font-weight: 700;
    color: #e2e8f0;
    background: #1a2540;
    border: 1px solid #1e2d4d;
    border-radius: 7px;
    padding: 8px 10px;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: .02em;
  }
  .btn-copiar {
    width: 100%;
    padding: 7px;
    background: #1e3a5f;
    border: 1px solid #3b6ff5;
    border-radius: 7px;
    color: #93c5fd;
    font-weight: 700;
    font-size: 11px;
    cursor: pointer;
    transition: background .15s;
    margin-bottom: 6px;
  }
  .btn-copiar:hover { background: #1e4080; }
  .btn-nova-sessao {
    width: 100%;
    padding: 6px;
    background: transparent;
    border: 1px solid #1e2d4d;
    border-radius: 7px;
    color: #475569;
    font-size: 11px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .btn-nova-sessao:hover { border-color: #3b6ff5; color: #94a3b8; }
</style>
</head>
<body>
  <div class="header">
    <img src="CaveiraCards.png" alt="CaveiraCards">
    <div class="header-text">
      <h1>CaveiraCards</h1>
      <p>@isakielsouza</p>
    </div>
  </div>

  <div class="toggle-wrap">
    <span id="toggle-label" class="toggle-label-text">Extensão ativa</span>
    <label class="switch">
      <input type="checkbox" id="toggle-enabled" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-wrap" style="margin-top: -8px; border-top: none; border-radius: 0; background: #0b1222;">
    <span id="toggle-professor-label" class="toggle-label-text" style="font-size: 11px; color: #64748b;">Salvar comentário do professor</span>
    <label class="switch" style="transform: scale(0.85);">
      <input type="checkbox" id="toggle-professor" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-wrap" style="margin-top: -8px; border-top: none; border-radius: 0 0 8px 8px; background: #0b1222;">
    <span id="toggle-manual-label" class="toggle-label-text" style="font-size: 11px; color: #64748b;">Salvar comentários dos alunos</span>
    <label class="switch" style="transform: scale(0.85);">
      <input type="checkbox" id="toggle-manual" checked>
      <span class="slider"></span>
    </label>
  </div>

  <p class="section-title">Plataformas</p>
  <div class="platforms" style="margin-bottom: 12px;">
    <button id="btn-plataformas" class="btn" style="margin-bottom: 0; width: 100%; justify-content: center;">
      <span>🌐 Plataformas homologadas</span>
    </button>
  </div>

  <p class="section-title">Sessão de estudo</p>
  <div class="session-box" id="session-box">

    <!-- Estado: idle -->
    <div class="session-idle" id="session-idle" style="flex-direction: column; gap: 10px;">
      <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
        <span class="session-idle-label">📚 Nenhuma sessão ativa</span>
        <button class="btn-iniciar" id="btn-iniciar">Iniciar</button>
      </div>
      <button id="btn-historico-idle" class="btn" style="padding: 6px; font-size: 11px; margin-bottom: 0; justify-content: center; background: #0b1222; width: 100%;">
        📊 Ver Histórico
      </button>
    </div>

    <!-- Estado: ativa -->
    <div class="session-active" id="session-active" style="display:none">
      <div class="session-stats">
        <div class="session-stat">
          <div class="session-stat-val green" id="session-timer">00:00</div>
          <div class="session-stat-label">Tempo</div>
        </div>
        <div class="session-stat">
          <div class="session-stat-val blue" id="session-questoes">0</div>
          <div class="session-stat-label">Total</div>
        </div>
        <div class="session-stat">
          <div class="session-stat-val gold" id="session-acertos">0</div>
          <div class="session-stat-label">Acertos</div>
        </div>
      </div>
      <button class="btn-encerrar" id="btn-encerrar">⏹ Encerrar sessão</button>
      <button id="btn-historico-active" class="btn" style="padding: 6px; font-size: 11px; margin-top: 10px; margin-bottom: 0; justify-content: center; background: #0b1222; width: 100%;">
        📊 Ver Histórico
      </button>
    </div>

    <!-- Estado: resumo -->
    <div class="session-summary" id="session-summary" style="display:none">
      <div class="summary-label">Resumo da sessão</div>
      <div class="summary-val" id="summary-val">—</div>
      <button class="btn-copiar" id="btn-copiar">📋 Copiar resumo</button>
      <button id="btn-historico-summary" class="btn" style="padding: 6px; font-size: 11px; margin-bottom: 6px; justify-content: center; width: 100%;">
        📊 Ver Histórico Completo
      </button>
      <button class="btn-nova-sessao" id="btn-nova-sessao">+ Nova sessão</button>
    </div>

  </div>

  <div class="toggle-wrap" style="margin-bottom: 8px;">
    <span id="anki-toggle-label" class="toggle-label-text" style="color: #64748b;">Anki</span>
    <label class="switch">
      <input type="checkbox" id="anki-toggle">
      <span class="slider"></span>
    </label>
  </div>
  <a class="btn" href="guia.html" target="_blank">📖 Guia de instalação</a>
  <button class="btn destaque" id="btn-doacao">❤️ Apoiar o projeto</button>

  <div class="footer">
    Projeto livre &nbsp;·&nbsp;
    <a href="https://instagram.com/isakielsouza" target="_blank">Instagram</a>
    &nbsp;·&nbsp;
    <span id="app-version">v—</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
