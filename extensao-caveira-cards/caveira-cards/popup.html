<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 280px;
    background: #080d1a;
    color: #e2e8f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 20px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .header img { width: 40px; height: 40px; border-radius: 50%; }
  .header-text h1 { font-size: 15px; font-weight: 700; color: #fff; }
  .header-text p { font-size: 11px; color: #3b6ff5; margin-top: 2px; }
  .section-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #334155;
    margin-bottom: 8px;
  }
  .platforms { margin-bottom: 16px; }
  .platform {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: #0f1729;
    border: 1px solid #1e2d4d;
    border-radius: 8px;
    margin-bottom: 6px;
  }
  .platform-name { font-size: 12px; color: #cbd5e1; }
  .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .badge.ativo { background: #14532d; color: #4ade80; }
  .badge.inativo { background: #1e2d4d; color: #475569; }
  .badge.breve { background: #1e1a2d; color: #7c3aed; font-style: italic; }
  .btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 10px 14px;
    background: #0f1729;
    border: 1px solid #1e2d4d;
    border-radius: 10px;
    color: #94a3b8;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    margin-bottom: 8px;
    transition: border-color .2s, color .2s;
  }
  .btn:hover { border-color: #3b6ff5; color: #e2e8f0; }
  .btn.destaque {
    background: #3b6ff5;
    border-color: #3b6ff5;
    color: white;
    font-weight: 700;
  }
  .btn.destaque:hover { background: #2d5ce0; }
  .setup-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 10px 14px;
    background: #0f1729;
    border: 1px solid #1e2d4d;
    border-radius: 10px;
    color: #94a3b8;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 8px;
    transition: border-color .2s, color .2s;
    text-align: left;
  }
  .setup-btn:hover { border-color: #3b6ff5; color: #e2e8f0; }
  .setup-status {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .setup-status.ok { background: #14532d; color: #4ade80; }
  .setup-status.pendente { background: #1e2d4d; color: #475569; }
  .setup-status.erro { background: #3b0a0a; color: #f87171; }
  .setup-status.carregando { background: #1e2d4d; color: #93c5fd; }
  .footer {
    margin-top: 14px;
    text-align: center;
    font-size: 10px;
    color: #1e2d4d;
  }
  .footer a { color: #3b6ff5; text-decoration: none; }

  /* ── Toggle switch ── */
  .toggle-wrap {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: #0f1729;
    border: 1px solid #1e2d4d;
    border-radius: 8px;
    margin-bottom: 12px;
  }
  .toggle-label-text { font-size: 12px; }
  .switch {
    position: relative;
    display: inline-block;
    width: 36px;
    height: 20px;
    flex-shrink: 0;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #334155;
    transition: .2s;
    border-radius: 20px;
  }
  .slider:before {
    position: absolute;
    content: "";
    height: 14px; width: 14px;
    left: 3px; bottom: 3px;
    background: white;
    transition: .2s;
    border-radius: 50%;
  }
  input:checked + .slider { background: #22c55e; }
  input:checked + .slider:before { transform: translateX(16px); }
</style>
</head>
<body>
  <div class="header">
    <img src="CaveiraCards.png" alt="CaveiraCards">
    <div class="header-text">
      <h1>CaveiraCards</h1>
      <p>@isakielsouza</p>
    </div>
  </div>

  <div class="toggle-wrap">
    <span id="toggle-label" class="toggle-label-text">Extensão ativa</span>
    <label class="switch">
      <input type="checkbox" id="toggle-enabled" checked>
      <span class="slider"></span>
    </label>
  </div>

  <p class="section-title">Plataformas</p>
  <div class="platforms">
    <div class="platform">
      <span class="platform-name">TEC Concursos</span>
      <span class="badge" id="badge-tec">inativo</span>
    </div>
    <div class="platform">
      <span class="platform-name">Gran Questões</span>
      <span class="badge" id="badge-gran">inativo</span>
    </div>
    <div class="platform">
      <span class="platform-name">QConcursos</span>
      <span class="badge" id="badge-qconcurso">inativo</span>
    </div>
    <div class="platform">
      <span class="platform-name">Deltinha</span>
      <span class="badge" id="badge-deltinha">inativo</span>
    </div>
    <div class="platform">
      <span class="platform-name">Projeto Caveira</span>
      <span class="badge" id="badge-projetocaveira">inativo</span>
    </div>
  </div>

  <button class="setup-btn" id="btn-setup">
    <span>⚙️ Configurar Anki</span>
    <span class="setup-status pendente" id="setup-status">pendente</span>
  </button>
  <a class="btn" href="guia.html" target="_blank">📖 Guia de instalação</a>
  <a class="btn destaque" href="doacao.html" target="_blank">❤️ Apoiar o projeto</a>

  <div class="footer">
    Projeto livre &nbsp;·&nbsp;
    <a href="https://instagram.com/isakielsouza" target="_blank">Instagram</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
