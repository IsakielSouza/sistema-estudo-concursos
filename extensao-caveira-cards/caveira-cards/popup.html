<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 280px;
    background: #080d1a;
    color: #e2e8f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 20px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .header img { width: 40px; height: 40px; border-radius: 50%; }
  .header-text h1 { font-size: 15px; font-weight: 700; color: #fff; }
  .header-text p { font-size: 11px; color: #3b6ff5; margin-top: 2px; }
  .section-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #334155;
    margin-bottom: 8px;
  }
  .platforms { margin-bottom: 16px; }
  .platform {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: #0f1729;
    border: 1px solid #1e2d4d;
    border-radius: 8px;
    margin-bottom: 6px;
  }
  .platform-name { font-size: 12px; color: #cbd5e1; }
  .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .badge.ativo { background: #14532d; color: #4ade80; }
  .badge.inativo { background: #1e2d4d; color: #475569; }
  .badge.breve { background: #1e1a2d; color: #7c3aed; font-style: italic; }
  .btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 10px 14px;
    background: #0f1729;
    border: 1px solid #1e2d4d;
    border-radius: 10px;
    color: #94a3b8;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    margin-bottom: 8px;
    transition: border-color .2s, color .2s;
  }
  .btn:hover { border-color: #3b6ff5; color: #e2e8f0; }
  .btn.destaque {
    background: #3b6ff5;
    border-color: #3b6ff5;
    color: white;
    font-weight: 700;
  }
  .btn.destaque:hover { background: #2d5ce0; }
  .setup-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 10px 14px;
    background: #0f1729;
    border: 1px solid #1e2d4d;
    border-radius: 10px;
    color: #94a3b8;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 8px;
    transition: border-color .2s, color .2s;
    text-align: left;
  }
  .setup-btn:hover { border-color: #3b6ff5; color: #e2e8f0; }
  .setup-status {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .setup-status.ok { background: #14532d; color: #4ade80; }
  .setup-status.pendente { background: #1e2d4d; color: #475569; }
  .setup-status.erro { background: #3b0a0a; color: #f87171; }
  .setup-status.carregando { background: #1e2d4d; color: #93c5fd; }
  .footer {
    margin-top: 14px;
    text-align: center;
    font-size: 10px;
    color: #1e2d4d;
  }
  .footer a { color: #3b6ff5; text-decoration: none; }
</style>
</head>
<body>
  <div class="header">
    <img src="CaveiraCards.png" alt="CaveiraCards">
    <div class="header-text">
      <h1>CaveiraCards</h1>
      <p>@isakielsouza</p>
    </div>
  </div>

  <p class="section-title">Plataformas</p>
  <div class="platforms">
    <div class="platform">
      <span class="platform-name">TEC Concursos</span>
      <span class="badge" id="badge-tec">inativo</span>
    </div>
    <div class="platform">
      <span class="platform-name">Gran Questões</span>
      <span class="badge" id="badge-gran">inativo</span>
    </div>
    <div class="platform">
      <span class="platform-name">QConcurso</span>
      <span class="badge breve">em breve</span>
    </div>
  </div>

  <button class="setup-btn" id="btn-setup">
    <span>⚙️ Configurar Anki</span>
    <span class="setup-status pendente" id="setup-status">pendente</span>
  </button>
  <a class="btn" href="guia.html" target="_blank">📖 Guia de instalação</a>
  <a class="btn destaque" href="doacao.html" target="_blank">❤️ Apoiar o projeto</a>

  <div class="footer">
    Projeto livre &nbsp;·&nbsp;
    <a href="https://github.com/isakielsouza" target="_blank">GitHub</a>
  </div>

  <script>
    // ── Badges de plataforma ──
    chrome.tabs.query({ active: true, currentWindow: true }, function (tabs) {
      if (!tabs[0]) return;
      const url = tabs[0].url || "";

      function setBadge(id, ativo) {
        const el = document.getElementById(id);
        el.textContent = ativo ? "ATIVO" : "inativo";
        el.className = "badge " + (ativo ? "ativo" : "inativo");
      }

      setBadge("badge-tec", url.includes("tecconcursos.com.br"));
      setBadge("badge-gran", url.includes("grancursosonline.com.br"));
    });

    // ── Setup Anki ──
    const statusEl = document.getElementById("setup-status");
    const btnSetup = document.getElementById("btn-setup");

    // Mostra status atual (se já foi configurado)
    chrome.storage.local.get("ankiSetupDone", ({ ankiSetupDone }) => {
      if (ankiSetupDone) {
        statusEl.textContent = "OK";
        statusEl.className = "setup-status ok";
      }
    });

    // Botão: executa setup manualmente
    btnSetup.addEventListener("click", async () => {
      statusEl.textContent = "...";
      statusEl.className = "setup-status carregando";

      try {
        const resp = await fetch("http://localhost:8765", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: "modelNames", version: 6, params: {} }),
        });
        const data = await resp.json();
        const modelos = data.result || [];

        if (modelos.includes("CaveiraCards")) {
          statusEl.textContent = "OK";
          statusEl.className = "setup-status ok";
          chrome.storage.local.set({ ankiSetupDone: true });
          return;
        }

        // Cria o modelo
        await fetch("http://localhost:8765", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            action: "createModel", version: 6,
            params: {
              modelName: "CaveiraCards",
              inOrderFields: ["Frente", "Verso", "Extra"],
              css: ".card { font-family: 'Segoe UI', system-ui, sans-serif; background: white; }",
              cardTemplates: [{
                Name: "CaveiraCards",
                Front: "{{Frente}}",
                Back: "{{Verso}}",
              }],
            }
          }),
        });

        statusEl.textContent = "OK";
        statusEl.className = "setup-status ok";
        chrome.storage.local.set({ ankiSetupDone: true });

      } catch (e) {
        statusEl.textContent = "Anki fechado";
        statusEl.className = "setup-status erro";
      }
    });
  </script>
</body>
</html>
