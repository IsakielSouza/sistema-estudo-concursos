<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Apoiar o CaveiraCards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f8fafc;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .container {
    max-width: 340px;
    width: 100%;
    text-align: center;
  }

  .avatar {
    width: 90px; height: 90px;
    border-radius: 50%;
    object-fit: cover;
    margin: 0 auto 16px;
    border: 3px solid #1a1a2e;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    display: block;
  }

  h1 { font-size: 22px; font-weight: 800; color: #1a1a2e; }
  .handle { font-size: 13px; color: #8c30f5; margin-top: 4px; margin-bottom: 24px; }

  .card {
    background: white;
    border-radius: 18px;
    padding: 28px 24px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    text-align: left;
  }

  .card h2 {
    font-size: 17px;
    font-weight: 800;
    color: #1a1a2e;
    margin-bottom: 8px;
  }

  .card p {
    font-size: 13px;
    color: #64748b;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .btn-nubank {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 16px;
    background: #8c30f5;
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: background .2s, transform .15s;
    letter-spacing: .01em;
  }

  .btn-nubank:hover  { background: #7a22e0; transform: translateY(-2px); }
  .btn-nubank:active { background: #6b1fd0; transform: translateY(0); }

  .btn-nubank .valor {
    background: rgba(255,255,255,0.2);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 14px;
  }

  .rodape {
    margin-top: 20px;
    font-size: 12px;
    color: #94a3b8;
  }
</style>
</head>
<body>
<div class="container">

  <img class="avatar" src="CaveiraCards.png" alt="CaveiraCards">
  <h1>CaveiraCards</h1>
  <p class="handle">@isakielsouza</p>

  <div class="card">
    <h2>Apoie o projeto ❤️</h2>
    <p>Se a extensão te ajudou nos estudos, considere uma contribuição para manter o projeto ativo e gratuito.</p>

    <button class="btn-nubank" id="btn-doar">
      💜 Apoiar com <span class="valor">R$ 2,00</span>
    </button>
  </div>

  <p class="rodape">Projeto livre · Feito com 💜 por @isakielsouza</p>

</div>

<script src="doacao.js"></script>
</body>
</html>
